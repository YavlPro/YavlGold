[mcp_servers.supabase]
command = "npx"
args = ["-y", "@supabase/mcp-server-supabase@0.5.5"]
env_vars = ["SUPABASE_ACCESS_TOKEN"]
startup_timeout_sec = 20
tool_timeout_sec = 90

[mcp_servers.git]
command = "uvx"
args = ["mcp-server-git", "--repository", ".."]
startup_timeout_sec = 20
tool_timeout_sec = 60
