<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YavlGold Agro - Tarjetas Ciclos de Cultivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .agro-cycles {
      --gold-1: #2a2218;
      --gold-2: #3a3228;
      --gold-3: #6b5a3e;
      --gold-4: #C8A752;
      --gold-5: #E8D48B;

      --bg-0: #050505;
      --bg-1: #0a0a0a;
      --bg-2: #0B0C0F;
      --bg-3: #111113;
      --bg-4: #1a1a1f;

      --text-primary: #ffffff;
      --text-secondary: #cccccc;
      --text-muted: #94A3B8;
      --text-gold-prestige: #E5D5A0;

      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;

      --border-neutral: rgba(255, 255, 255, 0.08);
      --border-gold: rgba(200, 167, 82, 0.25);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-pill: 9999px;

      --shadow-gold-sm: 0 2px 10px rgba(200, 167, 82, 0.15);
      --shadow-gold-md: 0 5px 20px rgba(200, 167, 82, 0.25);

      --text-xs: 0.70rem;
      --text-sm: 0.80rem;
      --text-base: 0.92rem;
      --text-md: 1.00rem;
      --text-lg: 1.10rem;
      --text-xl: 1.30rem;

      --metallic-border: linear-gradient(90deg, transparent, #6b5a3e, #C8A752, #E8D48B, #C8A752, #6b5a3e, transparent);
      --metallic-btn: linear-gradient(135deg, #6b5a3e, #C8A752, #E8D48B, #C8A752, #6b5a3e);
      --metallic-text: linear-gradient(135deg, #6b5a3e, #C8A752, #E8D48B, #C8A752, #6b5a3e);

      min-height: 100vh;
      padding: 1rem;
      background: linear-gradient(160deg, var(--bg-0), var(--bg-1), var(--bg-2));
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
    }

    .agro-cycles *,
    .agro-cycles *::before,
    .agro-cycles *::after {
      box-sizing: border-box;
    }

    .agro-cycles .cycles-head {
      max-width: 1100px;
      margin: 0 auto 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .agro-cycles .cycles-title {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: var(--text-xl);
      background: var(--metallic-text);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: metallicShift 5s linear infinite;
    }

    .agro-cycles .cycles-subtitle {
      margin: 0;
      color: var(--text-secondary);
      font-size: var(--text-base);
      font-weight: 600;
    }

    .agro-cycles .cycles-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .agro-cycles .cycle-card {
      position: relative;
      background: var(--bg-4);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease;
      animation: fadeInUp 180ms ease both;
    }

    .agro-cycles .cycle-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--metallic-border);
      background-size: 200% 100%;
      animation: borderShimmer 3s linear infinite;
    }

    .agro-cycles .cycle-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-gold-sm);
    }

    .agro-cycles .cycle-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem;
      background: var(--bg-3);
      border-bottom: 1px solid var(--border-neutral);
    }

    .agro-cycles .crop-headline {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      min-width: 0;
    }

    .agro-cycles .crop-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-gold);
      background: var(--gold-1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-xl);
      flex-shrink: 0;
      animation: breathe 3s ease-in-out infinite;
    }

    .agro-cycles .crop-name-wrap {
      min-width: 0;
    }

    .agro-cycles .crop-name {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: var(--text-md);
      color: var(--text-primary);
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agro-cycles .crop-meta {
      margin: 0.2rem 0 0;
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-weight: 600;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agro-cycles .status-badge {
      flex-shrink: 0;
      padding: 0.35rem 0.55rem;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-neutral);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: var(--text-xs);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .agro-cycles .status-badge.status-produccion {
      background: color-mix(in srgb, var(--gold-4) 12%, transparent);
      color: var(--gold-4);
      border-color: var(--border-gold);
    }

    .agro-cycles .status-badge.status-siembra {
      background: color-mix(in srgb, var(--color-success) 10%, transparent);
      color: var(--color-success);
      border-color: color-mix(in srgb, var(--color-success) 30%, transparent);
    }

    .agro-cycles .status-badge.status-cosecha {
      background: color-mix(in srgb, var(--color-warning) 10%, transparent);
      color: var(--color-warning);
      border-color: color-mix(in srgb, var(--color-warning) 30%, transparent);
    }

    .agro-cycles .progress-box {
      padding: 0.85rem;
      border-bottom: 1px solid var(--border-neutral);
    }

    .agro-cycles .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .agro-cycles .progress-label {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .agro-cycles .progress-value {
      margin: 0;
      font-size: var(--text-sm);
      color: var(--text-gold-prestige);
      font-weight: 700;
      white-space: nowrap;
    }

    .agro-cycles .progress-track {
      position: relative;
      width: 100%;
      height: 9px;
      border-radius: var(--radius-pill);
      background: var(--bg-2);
      border: 1px solid var(--border-neutral);
      overflow: hidden;
    }

    .agro-cycles .progress-fill {
      position: relative;
      height: 100%;
      border-radius: var(--radius-pill);
      background: var(--metallic-btn);
      background-size: 200% 100%;
      animation: metallicShift 5s linear infinite;
      transition: width 180ms ease;
    }

    .agro-cycles .progress-fill::after {
      content: "";
      position: absolute;
      right: 0;
      top: 50%;
      transform: translate(50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: var(--radius-pill);
      background: var(--gold-5);
      box-shadow: var(--shadow-gold-sm);
    }

    .agro-cycles .metrics-grid {
      padding: 0.85rem;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.55rem;
    }

    .agro-cycles .metric-item {
      padding: 0.5rem 0.6rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-neutral);
      background: var(--bg-3);
      min-height: 55px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.18rem;
    }

    .agro-cycles .metric-label {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: var(--text-xs);
      color: var(--text-muted);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .agro-cycles .metric-value {
      margin: 0;
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .agro-cycles .metric-value.metric-gold {
      color: var(--gold-4);
    }

    .agro-cycles .metric-value.metric-success {
      color: var(--color-success);
    }

    .agro-cycles .metric-value.metric-error {
      color: var(--color-error);
    }

    .agro-cycles .net-row {
      padding: 0.8rem 0.85rem;
      border-top: 1px solid var(--border-neutral);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
    }

    .agro-cycles .net-label {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: var(--text-sm);
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .agro-cycles .net-value {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: var(--text-lg);
      line-height: 1;
    }

    .agro-cycles .net-value.net-success {
      color: var(--color-success);
    }

    .agro-cycles .net-value.net-error {
      color: var(--color-error);
    }

    .agro-cycles .financial-breakdown {
      margin: 0 0.85rem 0.85rem;
      border: 1px solid var(--border-neutral);
      border-radius: var(--radius-md);
      background: var(--bg-3);
      overflow: hidden;
    }

    .agro-cycles .financial-breakdown summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      cursor: pointer;
      background: var(--bg-3);
      color: var(--gold-3);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: var(--text-sm);
      transition: color 180ms ease, background 180ms ease;
    }

    .agro-cycles .financial-breakdown summary:hover {
      color: var(--gold-4);
      background: color-mix(in srgb, var(--gold-4) 8%, var(--bg-3));
    }

    .agro-cycles .financial-breakdown summary::-webkit-details-marker {
      display: none;
    }

    .agro-cycles .chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-sm);
      line-height: 1;
      transition: transform 180ms ease;
    }

    .agro-cycles .financial-breakdown[open] .chevron {
      transform: rotate(180deg);
    }

    .agro-cycles .breakdown-body {
      border-top: 1px solid var(--border-neutral);
      padding: 0.35rem 0.75rem 0.6rem;
      display: grid;
      gap: 0.3rem;
      background: var(--bg-4);
    }

    .agro-cycles .breakdown-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.6rem;
      padding: 0.25rem 0;
    }

    .agro-cycles .breakdown-key {
      margin: 0;
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-weight: 600;
    }

    .agro-cycles .breakdown-value {
      margin: 0;
      text-align: right;
      font-size: var(--text-sm);
      color: var(--text-secondary);
      font-weight: 700;
    }

    @media (min-width: 769px) {
      .agro-cycles {
        padding: 1.4rem;
      }

      .agro-cycles .cycles-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 480px) {
      .agro-cycles {
        padding: 0.75rem;
      }

      .agro-cycles .cycle-header,
      .agro-cycles .progress-box,
      .agro-cycles .metrics-grid,
      .agro-cycles .net-row {
        padding-left: 0.7rem;
        padding-right: 0.7rem;
      }

      .agro-cycles .metrics-grid {
        gap: 0.45rem;
      }

      .agro-cycles .financial-breakdown {
        margin: 0 0.7rem 0.7rem;
      }
    }

    @keyframes metallicShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes borderShimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(200, 167, 82, 0.15)); }
      50% { transform: scale(1.04); filter: drop-shadow(0 0 10px rgba(200, 167, 82, 0.35)); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="agro-cycles">
    <header class="cycles-head">
      <h1 class="cycles-title">Ciclos de Cultivo Activos</h1>
      <p class="cycles-subtitle">Vista premium de progreso y salud financiera por ciclo.</p>
    </header>
    <section id="agro-cycles-grid" class="cycles-grid" aria-live="polite"></section>
  </main>

  <script>
    const ciclos = [
      {
        nombre: 'Batata Amarilla',
        variedad: 'Amarilla 2',
        icono: '🍠',
        estado: 'produccion',
        estadoTexto: 'En producción',
        area: '0.5 Ha',
        siembra: '20 Ago 2025',
        cosechaEst: '1 Mar 2026',
        diaActual: 192,
        diasTotales: 193,
        inversionUSD: 200,
        rentabilidad: 147,
        potencialNeto: 667,
        desglose: {
          base: '$200 · 740.956 COP · 82.809,10 Bs',
          gastos: '$0',
          pagados: '$347',
          costos: '$200',
          fiados: '$520',
          cotizacion: '1 USD = 3.705 COP · 1 USD = 414,05 Bs'
        }
      },
      {
        nombre: 'Maíz',
        variedad: 'Jojoto',
        icono: '🌽',
        estado: 'siembra',
        estadoTexto: 'Siembra',
        area: '0.5 Ha',
        siembra: '9 Feb 2026',
        cosechaEst: '9 May 2026',
        diaActual: 19,
        diasTotales: 89,
        inversionUSD: 210,
        rentabilidad: -210,
        potencialNeto: -210,
        desglose: {
          base: '$210 · 778.003 COP · 86.949,56 Bs',
          gastos: '$0',
          pagados: '$0',
          costos: '$210',
          fiados: '$0',
          cotizacion: '1 USD = 3.705 COP · 1 USD = 414,05 Bs'
        }
      }
    ];

    const statusClassByState = {
      produccion: 'status-produccion',
      siembra: 'status-siembra',
      cosecha: 'status-cosecha'
    };

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

    const formatUsd = (value) => {
      const abs = Math.abs(Number(value) || 0);
      return '$' + abs.toLocaleString('es-VE', { maximumFractionDigits: 0 });
    };

    const formatSignedUsd = (value) => {
      const num = Number(value) || 0;
      const sign = num >= 0 ? '+' : '-';
      return `${sign}${formatUsd(num)}`;
    };

    const getProgressPct = (diaActual, diasTotales) => {
      if (!Number(diasTotales)) return 0;
      return clamp(Math.round((Number(diaActual) / Number(diasTotales)) * 100), 0, 100);
    };

    const renderCycles = () => {
      const container = document.getElementById('agro-cycles-grid');
      if (!container) return;

      container.innerHTML = ciclos.map((ciclo, index) => {
        const progress = getProgressPct(ciclo.diaActual, ciclo.diasTotales);
        const statusClass = statusClassByState[ciclo.estado] || 'status-produccion';
        const rentabilidadPositiva = Number(ciclo.rentabilidad) >= 0;
        const potencialPositivo = Number(ciclo.potencialNeto) >= 0;
        const trendIcon = rentabilidadPositiva ? '↗' : '↘';
        const trendClass = rentabilidadPositiva ? 'metric-success' : 'metric-error';
        const netClass = potencialPositivo ? 'net-success' : 'net-error';
        const rentabilidadTexto = formatSignedUsd(ciclo.rentabilidad);
        const potencialTexto = formatSignedUsd(ciclo.potencialNeto);

        return `
          <article class="cycle-card" style="animation-delay:${index * 70}ms;">
            <header class="cycle-header">
              <div class="crop-headline">
                <div class="crop-icon" aria-hidden="true">${ciclo.icono}</div>
                <div class="crop-name-wrap">
                  <h2 class="crop-name">${ciclo.nombre}</h2>
                  <p class="crop-meta">${ciclo.variedad} · ${ciclo.area}</p>
                </div>
              </div>
              <span class="status-badge ${statusClass}">${ciclo.estadoTexto}</span>
            </header>

            <section class="progress-box" aria-label="Progreso del ciclo">
              <div class="progress-head">
                <p class="progress-label">Progreso</p>
                <p class="progress-value">Día ${ciclo.diaActual}/${ciclo.diasTotales} (${progress}%)</p>
              </div>
              <div class="progress-track">
                <div class="progress-fill" style="width:${progress}%"></div>
              </div>
            </section>

            <section class="metrics-grid" aria-label="Resumen rápido del ciclo">
              <article class="metric-item">
                <p class="metric-label">Siembra</p>
                <p class="metric-value">${ciclo.siembra}</p>
              </article>
              <article class="metric-item">
                <p class="metric-label">Cosecha estimada</p>
                <p class="metric-value">${ciclo.cosechaEst}</p>
              </article>
              <article class="metric-item">
                <p class="metric-label">Inversión USD</p>
                <p class="metric-value metric-gold">${formatUsd(ciclo.inversionUSD)}</p>
              </article>
              <article class="metric-item">
                <p class="metric-label">Rentabilidad</p>
                <p class="metric-value ${trendClass}">${trendIcon} ${rentabilidadTexto}</p>
              </article>
            </section>

            <div class="net-row">
              <p class="net-label">Potencial neto</p>
              <p class="net-value ${netClass}">${potencialTexto}</p>
            </div>

            <details class="financial-breakdown">
              <summary>
                <span>Ver desglose financiero</span>
                <span class="chevron" aria-hidden="true">⌄</span>
              </summary>
              <div class="breakdown-body">
                <div class="breakdown-row">
                  <p class="breakdown-key">Base inversión multimoneda</p>
                  <p class="breakdown-value">${ciclo.desglose.base}</p>
                </div>
                <div class="breakdown-row">
                  <p class="breakdown-key">Gastos acumulados</p>
                  <p class="breakdown-value">${ciclo.desglose.gastos}</p>
                </div>
                <div class="breakdown-row">
                  <p class="breakdown-key">Pagados</p>
                  <p class="breakdown-value">${ciclo.desglose.pagados}</p>
                </div>
                <div class="breakdown-row">
                  <p class="breakdown-key">Costos</p>
                  <p class="breakdown-value">${ciclo.desglose.costos}</p>
                </div>
                <div class="breakdown-row">
                  <p class="breakdown-key">Fiados</p>
                  <p class="breakdown-value">${ciclo.desglose.fiados}</p>
                </div>
                <div class="breakdown-row">
                  <p class="breakdown-key">Nota de cotización</p>
                  <p class="breakdown-value">${ciclo.desglose.cotizacion}</p>
                </div>
              </div>
            </details>
          </article>
        `;
      }).join('');
    };

    renderCycles();
  </script>
</body>
</html>
